# GitLab CI configuration for SpiPy
# Tests across Python 3.9-3.14 to match GitHub workflows

image: continuumio/miniconda3

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  GIT_LFS_SKIP_SMUDGE: "1"  # Skip LFS downloads to avoid quota issues

cache:
  paths:
    - .cache/pip

# Test matrix across Python versions 3.9-3.14
.test_template: &test_template
  script:
    - python --version
    - conda create -y -n buildenv python=$PYTHON_VERSION
    - source activate buildenv
    - conda install -c conda-forge nlopt swig gxx gcc make
    - pip install --editable ".[test]"
    - python -c "import spires; print('Version:', spires.__version__)"
    - pytest --doctest-modules

test:python3.9:
  <<: *test_template
  variables:
    PYTHON_VERSION: "3.9"

test:python3.10:
  <<: *test_template
  variables:
    PYTHON_VERSION: "3.10"

test:python3.11:
  <<: *test_template
  variables:
    PYTHON_VERSION: "3.11"

test:python3.12:
  <<: *test_template
  variables:
    PYTHON_VERSION: "3.12"

test:python3.13:
  <<: *test_template
  variables:
    PYTHON_VERSION: "3.13"

test:python3.14:
  <<: *test_template
  variables:
    PYTHON_VERSION: "3.14"

build:
  before_script:
    - conda create -y -n buildenv python=3.11
    - source activate buildenv
    - conda install -c conda-forge nlopt swig gxx gcc make
    - pip install .
  script:
    - python setup.py build_ext --inplace --verbose
  artifacts:
    paths:
      - build/*

docs:
  before_script:
    - conda create -y -n buildenv python=3.11
    - source activate buildenv
    - conda install -c conda-forge nlopt swig gxx gcc make
    - pip install .
  script:
    - pip install --editable ".[docs]"
    - cd doc
    - make html
    - mv build/html/ ../public/
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  allow_failure: true  # Don't block pipeline if docs fail

deploy:
  stage: deploy
  script: echo "PyPI deployment handled by GitHub Actions"
  environment: production
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  when: manual
